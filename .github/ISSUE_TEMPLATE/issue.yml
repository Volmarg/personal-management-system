name: Generic template
description: All-purpose issue report
title: ""
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        # Template Info

        I've created this issue template due to plenty of reports:
        - having no sense,
        - not providing any necessary debug data,

  - type: markdown
    attributes:
      value: |
        ## Reminder

        The project is supposed to be used for storing private data, within private network.

        If you are reporting issues such as:
        - unauthorized user can upload malicious code

        then in 90% of cases this issue will be closed, because this violates the main idea of the project.

        If you really must have external access, it is up to you to configure security on the network / OS level.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem.
      placeholder: What is happening?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so the issue can be recreated.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: debug
    attributes:
      label: Debug data / Screenshots
      description: Provide logs, screenshots, or any relevant debug data.

  - type: markdown
    attributes:
      value: |
        ## Notes

        - Double check your report can be recreated with the data you provided.
        - Security issues will most likely be ignored if they contradict the project design.
        - Feel free to submit a pull request.

  - type: markdown
    attributes:
      value: |
        ## Response Time

        I spend about 30–60 minutes per day on this project.  
        Sometimes less, sometimes none for a few days — please be patient.